
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Complete Roadmap – 45 Days</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060818;
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.10);
    --border-bright: rgba(255,255,255,0.22);
    --text: #e8eaf6;
    --text-dim: #8892b0;
    --accent1: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --accent4: #10b981;
    --accent5: #f43f5e;
    --accent6: #a855f7;
    --h1c: #a78bfa;
    --h2c: #67e8f9;
    --h3c: #fde68a;
    --h4c: #6ee7b7;
  }
 
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
 
  /* Animated background blobs */
  .bg-blobs {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    overflow: hidden;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: blobFloat 18s ease-in-out infinite alternate;
  }
  .blob1 { width: 600px; height: 600px; background: var(--accent1); top: -200px; left: -200px; animation-duration: 20s; }
  .blob2 { width: 500px; height: 500px; background: var(--accent2); top: 30%; right: -150px; animation-duration: 16s; }
  .blob3 { width: 400px; height: 400px; background: var(--accent5); bottom: -100px; left: 30%; animation-duration: 22s; }
  .blob4 { width: 300px; height: 300px; background: var(--accent4); bottom: 20%; left: -100px; animation-duration: 14s; }
  @keyframes blobFloat {
    0% { transform: translate(0,0) scale(1); }
    100% { transform: translate(60px, 40px) scale(1.1); }
  }
 
  .wrapper {
    position: relative; z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }
 
  /* HERO */
  .hero {
    text-align: center;
    padding: 60px 20px 50px;
    margin-bottom: 40px;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(124,58,237,0.18);
    border: 1px solid rgba(124,58,237,0.4);
    border-radius: 100px;
    padding: 6px 18px;
    font-size: 12px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent6);
    margin-bottom: 24px;
  }
  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.6rem, 6vw, 5rem);
    font-weight: 800;
    line-height: 1.05;
    background: linear-gradient(135deg, #a78bfa 0%, #67e8f9 50%, #fde68a 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 18px;
  }
  .hero p {
    color: var(--text-dim);
    font-size: 1.1rem;
    max-width: 560px;
    margin: 0 auto 30px;
    line-height: 1.7;
  }
  .hero-stats {
    display: flex; justify-content: center; gap: 30px; flex-wrap: wrap;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    backdrop-filter: blur(12px);
    border-radius: 14px;
    padding: 14px 28px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem; font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #67e8f9);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
 
  /* SEARCH + FILTER */
  .controls {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-bottom: 32px;
    align-items: center;
  }
  .search-wrap {
    flex: 1; min-width: 220px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    padding: 12px 16px 12px 44px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border 0.2s;
  }
  .search-wrap input:focus { border-color: var(--border-bright); }
  .search-wrap input::placeholder { color: var(--text-dim); }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim); font-size: 1rem;
  }
  .filter-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
    border-radius: 10px;
    padding: 10px 16px;
    color: var(--text-dim);
    font-size: 0.8rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--surface-hover);
    border-color: var(--border-bright);
    color: var(--text);
  }
  .filter-btn.active { color: var(--accent6); border-color: var(--accent1); }
 
  /* PROGRESS BAR */
  .progress-section {
    background: var(--surface);
    border: 1px solid var(--border);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 32px;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  .progress-label { font-size: 0.85rem; color: var(--text-dim); white-space: nowrap; }
  .progress-bar-wrap { flex: 1; min-width: 160px; background: rgba(255,255,255,0.06); border-radius: 100px; height: 8px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--accent1), var(--accent2)); transition: width 0.4s ease; }
  .progress-count { font-size: 0.85rem; font-weight: 600; color: var(--h1c); white-space: nowrap; }
 
  /* DAY CARDS */
  .days-grid { display: flex; flex-direction: column; gap: 20px; }
 
  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    backdrop-filter: blur(16px);
    border-radius: 20px;
    overflow: hidden;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .day-card:hover {
    border-color: var(--border-bright);
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }
 
  .day-header {
    display: flex; align-items: center; gap: 16px;
    padding: 18px 24px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }
  .day-header:hover { background: var(--surface-hover); }
 
  .day-num {
    min-width: 52px; height: 52px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem; font-weight: 800;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
 
  .day-meta { flex: 1; }
  .day-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.05rem; font-weight: 700;
    margin-bottom: 4px;
  }
  .day-sub {
    font-size: 0.8rem; color: var(--text-dim);
    display: flex; gap: 14px; flex-wrap: wrap;
  }
  .day-sub span { display: flex; align-items: center; gap: 4px; }
 
  .day-chevron {
    color: var(--text-dim); font-size: 1.1rem;
    transition: transform 0.3s;
  }
  .day-card.open .day-chevron { transform: rotate(180deg); }
 
  .day-check {
    width: 26px; height: 26px; border-radius: 8px;
    border: 2px solid var(--border-bright);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    transition: all 0.2s;
    font-size: 0.85rem;
  }
  .day-check.checked {
    background: var(--accent4);
    border-color: var(--accent4);
    color: #000;
  }
 
  .day-body {
    display: none;
    padding: 0 24px 24px;
  }
  .day-card.open .day-body { display: block; }
 
  /* Topics inside day */
  .topic-block { margin-bottom: 22px; }
  .topic-block:last-child { margin-bottom: 0; }
 
  .topic-h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.45rem; font-weight: 800;
    color: var(--h1c);
    margin: 16px 0 10px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid rgba(167,139,250,0.2);
    padding-bottom: 8px;
  }
  .topic-h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.15rem; font-weight: 700;
    color: var(--h2c);
    margin: 14px 0 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .topic-h3 {
    font-family: 'Syne', sans-serif;
    font-size: 0.98rem; font-weight: 700;
    color: var(--h3c);
    margin: 10px 0 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .topic-h4 {
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem; font-weight: 600;
    color: var(--h4c);
    margin: 8px 0 4px;
    display: flex; align-items: center; gap: 6px;
  }
 
  .topics-list {
    list-style: none;
    padding: 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
  }
  .topics-list li {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.82rem;
    color: var(--text-dim);
    display: flex; align-items: flex-start; gap: 8px;
    transition: background 0.18s, color 0.18s;
  }
  .topics-list li:hover { background: rgba(255,255,255,0.07); color: var(--text); }
  .topics-list li .dot {
    width: 6px; height: 6px; border-radius: 50%;
    flex-shrink: 0; margin-top: 5px;
  }
 
  .tip-box {
    background: rgba(6,182,212,0.08);
    border: 1px solid rgba(6,182,212,0.25);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.8rem;
    color: #67e8f9;
    margin-top: 12px;
    display: flex; gap: 8px; align-items: flex-start;
  }
  .tip-box .tip-icon { flex-shrink: 0; }
 
  /* Color themes per week */
  .week1 .day-num { background: rgba(124,58,237,0.2); color: #c4b5fd; border: 1px solid rgba(124,58,237,0.3); }
  .week2 .day-num { background: rgba(6,182,212,0.2); color: #67e8f9; border: 1px solid rgba(6,182,212,0.3); }
  .week3 .day-num { background: rgba(245,158,11,0.2); color: #fde68a; border: 1px solid rgba(245,158,11,0.3); }
  .week4 .day-num { background: rgba(16,185,129,0.2); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
  .week5 .day-num { background: rgba(244,63,94,0.2); color: #fda4af; border: 1px solid rgba(244,63,94,0.3); }
  .week6 .day-num { background: rgba(168,85,247,0.2); color: #d8b4fe; border: 1px solid rgba(168,85,247,0.3); }
  .week7 .day-num { background: rgba(251,146,60,0.2); color: #fed7aa; border: 1px solid rgba(251,146,60,0.3); }
 
  /* Week separator */
  .week-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--text-dim);
    padding: 8px 0 4px;
    display: flex; align-items: center; gap: 14px;
  }
  .week-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
 
  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 100px; }
 
  @media (max-width: 600px) {
    .hero h1 { font-size: 2rem; }
    .day-header { padding: 14px 16px; }
    .day-body { padding: 0 16px 18px; }
    .topics-list { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
 
<div class="bg-blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="blob blob4"></div>
</div>
 
<div class="wrapper">
 
  <!-- HERO -->
  <div class="hero">
    <div class="hero-badge">🎨 Complete Learning Path</div>
    <h1>CSS Complete<br>Roadmap</h1>
    <p>Master every CSS concept from absolute basics to advanced techniques — structured into a focused 45-day plan.</p>
    <div class="hero-stats">
      <div class="stat"><div class="stat-num">45</div><div class="stat-label">Days</div></div>
      <div class="stat"><div class="stat-num">180+</div><div class="stat-label">Topics</div></div>
      <div class="stat"><div class="stat-num">7</div><div class="stat-label">Weeks</div></div>
      <div class="stat"><div class="stat-num">~2–4h</div><div class="stat-label">Per Day</div></div>
    </div>
  </div>
 
  <!-- CONTROLS -->
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search topics, days, concepts...">
    </div>
    <div class="filter-btns">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="week1">Week 1</button>
      <button class="filter-btn" data-filter="week2">Week 2</button>
      <button class="filter-btn" data-filter="week3">Week 3</button>
      <button class="filter-btn" data-filter="week4">Week 4</button>
      <button class="filter-btn" data-filter="week5">Week 5</button>
      <button class="filter-btn" data-filter="week6">Week 6</button>
      <button class="filter-btn" data-filter="week7">Week 7</button>
    </div>
  </div>
 
  <!-- PROGRESS -->
  <div class="progress-section">
    <span class="progress-label">📊 Overall Progress</span>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
    <span class="progress-count" id="progressCount">0 / 45 days</span>
  </div>
 
  <!-- DAYS -->
  <div class="days-grid" id="daysGrid"></div>
 
</div>
 
<script>
const days = [
  // ── WEEK 1: Foundations ──────────────────────────────────────────────────
  {
    day: 1, week: 'week1',
    title: 'Introduction to CSS',
    time: '2h', topics: 4,
    content: `
      <div class="topic-block">
        <div class="topic-h1"># What is CSS?</div>
        <ul class="topics-list">
          <li><span class="dot" style="background:#a78bfa"></span>History & evolution of CSS (CSS1, CSS2, CSS3, CSS4)</li>
          <li><span class="dot" style="background:#a78bfa"></span>How browsers render CSS</li>
          <li><span class="dot" style="background:#a78bfa"></span>CSS working group & specifications</li>
          <li><span class="dot" style="background:#a78bfa"></span>Role of CSS in web development</li>
        </ul>
        <div class="topic-h2">## Ways to Add CSS</div>
        <ul class="topics-list">
          <li><span class="dot" style="background:#67e8f9"></span>Inline CSS (style attribute)</li>
          <li><span class="dot" style="background:#67e8f9"></span>Internal CSS (&lt;style&gt; tag)</li>
          <li><span class="dot" style="background:#67e8f9"></span>External CSS (&lt;link&gt; tag)</li>
          <li><span class="dot" style="background:#67e8f9"></span>@import rule</li>
        </ul>
        <div class="topic-h2">## CSS Syntax & Structure</div>
        <ul class="topics-list">
          <li><span class="dot" style="background:#67e8f9"></span>Selector { property: value; }</li>
          <li><span class="dot" style="background:#67e8f9"></span>Declaration block</li>
          <li><span class="dot" style="background:#67e8f9"></span>CSS comments</li>
          <li><span class="dot" style="background:#67e8f9"></span>Case sensitivity rules</li>
        </ul>
        <div class="tip-box"><span class="tip-icon">💡</span> Practice: Link an external CSS file to a basic HTML page and style headings and paragraphs.</div>
      </div>`
  },
  {
    day: 2, week: 'week1',
    title: 'Selectors (Part 1)',
    time: '3h', topics: 6,
    content: `
      <div class="topic-block">
        <div class="topic-h1"># CSS Selectors — Basic</div>
        <div class="topic-h2">## Simple Selectors</div>
        <ul class="topics-list">
          <li><span class="dot" style="background:#a78bfa"></span>Universal selector (*)</li>
          <li><span class="dot" style="background:#a78bfa"></span>Type / Element selector (div, p, h1…)</li>
          <li><span class="dot" style="background:#a78bfa"></span>Class selector (.classname)</li>
          <li><span class="dot" style="background:#a78bfa"></span>ID selector (#idname)</li>
          <li><span class="dot" style="background:#a78bfa"></span>Multiple class chaining (.a.b)</li>
        </ul>
        <div class="topic-h2">## Grouping & Combinators</div>
        <ul class="topics-list">
          <li><span class="dot" style="background:#67e8f9"></span>Grouping selector (A, B)</li>
          <li><span class="dot" style="background:#67e8f9"></span>Descendant combinator (A B)</li>
          <li><span class="dot" style="background:#67e8f9"></span>Child combinator (A > B)</li>
          <li><span class="dot" style="background:#67e8f9"></span>Adjacent sibling combinator (A + B)</li>
          <li><span class="dot" style="background:#67e8f9"></span>General sibling combinator (A ~ B)</li>
        </ul>
        <div class="tip-box"><span class="tip-icon">💡</span> Practice: Style a navigation menu using only combinators.</div>
      </div>`
  },
  {
    day: 3, week: 'week1',
    title: 'Selectors (Part 2) — Attribute & Pseudo',
    time: '3h', topics: 8,
    content: `
      <div class="topic-block">
        <div class="topic-h1"># Advanced Selectors</div>
        <div class="topic-h2">## Attribute Selectors</div>
        <ul class="topics-list">
          <li><span class="dot" style="background:#a78bfa"></span>[attr] – element has attribute</li>
          <li><span class="dot" style="background:#a78bfa"></span>[attr=value] – exact match</li>
          <li><span class="dot" style="background:#a78bfa"></span>[attr~=value] – space-separated list contains</li>
          <li><span class="dot" style="background:#a78bfa"></span>[attr|=value] – starts with value or value-</li>
          <li><span class="dot" style="background:#a78bfa"></span>[attr^=value] – starts with</li>
          <li><span class="dot" style="background:#a78bfa"></span>[attr$=value] – ends with</li>
          <li><span class="dot" style="background:#a78bfa"></span>[attr*=value] – contains substring</li>
          <li><span class="dot" style="background:#a78bfa"></span>Case-insensitive flag [attr=val i]</li>
        </ul>
        <div class="topic-h2">## Pseudo-Classes (Structural)</div>
        <ul class="topics-list">
          <li><span class="dot" style="background:#67e8f9"></span>:first-child / :last-child</li>
          <li><span class="dot" style="background:#67e8f9"></span>:nth-child(n) / :nth-last-child(n)</li>
          <li><span class="dot" style="background:#67e8f9"></span>:nth-of-type(n)</li>
          <li><span class="dot" style="background:#67e8f9"></span>:first-of-type / :last-of-type</li>
          <li><span class="dot" style="background:#67e8f9"></span>:only-child / :only-of-type</li>
          <li><span class="dot" style="background:#67e8f9"></span>:empty</li>
          <li><span class="dot" style="background:#67e8f9"></span>:root</li>
        </ul>
        <div class="topic-h2">## Pseudo-Classes (User Action)</div>
        <ul class="topics-list">
          <li><span class="dot" style="background:#fde68a"></span>:hover / :focus / :active</li>
          <li><span class="dot" style="background:#fde68a"></span>:visited / :link</li>
          <li><span class="dot" style="background:#fde68a"></span>:checked / :disabled / :enabled</li>
          <li><span class="dot" style="background:#fde68a"></span>:required / :optional</li>
          <li><span class="dot" style="background:#fde68a"></span>:valid / :invalid</li>
          <li><span class="dot" style="background:#fde68a"></span>:placeholder-shown</li>
          <li><span class="dot" style="background:#fde68a"></span>:focus-within / :focus-visible</li>
        </ul>
        <div class="topic-h2">## Pseudo-Elements</div>
        <ul class="topics-list">
          <li><span class="dot" style="background:#6ee7b7"></span>::before / ::after</li>
          <li><span class="dot" style="background:#6ee7b7"></span>::first-line / ::first-letter</li>
          <li><span class="dot" style="background:#6ee7b7"></span>::placeholder</li>
          <li><span class="dot" style="background:#6ee7b7"></span>::selection</li>
          <li><span class="dot" style="background:#6ee7b7"></span>::marker</li>
          <li><span class="dot" style="background:#6ee7b7"></span>::backdrop</li>
        </ul>
        <div class="tip-box"><span class="tip-icon">💡</span> Practice: Style a form entirely using attribute and pseudo-class selectors without adding classes.</div>
      </div>`
  },
  {
    day: 4, week: 'week1',
    title: 'Specificity, Cascade & Inheritance',
    time: '3h', topics: 5,
    content: `
      <div class="topic-block">
        <div class="topic-h1"># The Cascade</div>
        <div class="topic-h2">## Cascade Order</div>
        <ul class="topics-list">
          <li><span class="dot" style="background:#a78bfa"></span>Browser default styles</li>
          <li><span class="dot" style="background:#a78bfa"></span>User stylesheets</li>
          <li><span class="dot" style="background:#a78bfa"></span>Author stylesheets</li>
          <li><span class="dot" style="background:#a78bfa"></span>!important declarations</li>
          <li><span class="dot" style="background:#a78bfa"></span>Cascade layers (@layer)</li>
        </ul>

const weekLabels = {
  week1: 'Week 1 — Foundations (Days 1–7)',
  week2: 'Week 2 — Box Model & Layout Basics (Days 8–14)',
  week3: 'Week 3 — Flexbox, Grid & Responsive (Days 15–21)',
  week4: 'Week 4 — Animations & Visual Effects (Days 22–28)',
  week5: 'Week 5 — Advanced Layout & Modern CSS (Days 29–35)',
  week6: 'Week 6 — Architecture, Preprocessors & A11y (Days 36–42)',
  week7: 'Week 7 — Future CSS & Capstone (Days 43–45)'
};
 
function buildGrid(filter = 'all', search = '') {
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';
  let lastWeek = null;
  let shown = 0;
  days.forEach(d => {
    const matchFilter = filter === 'all' || d.week === filter;
    const matchSearch = !search ||
      d.title.toLowerCase().includes(search) ||
      d.content.toLowerCase().includes(search) ||
      String(d.day).includes(search);
    if (!matchFilter || !matchSearch) return;
    shown++;
    if (d.week !== lastWeek) {
      const lbl = document.createElement('div');
      lbl.className = 'week-label';
      lbl.textContent = weekLabels[d.week];
      grid.appendChild(lbl);
      lastWeek = d.week;
    }
    const card = document.createElement('div');
    const checked = localStorage.getItem('day_' + d.day) === '1';
    card.className = `day-card ${d.week}`;
    card.dataset.day = d.day;
    card.innerHTML = `
      <div class="day-header" onclick="toggleCard(this.parentElement)">
        <div class="day-num">DAY<br>${d.day}</div>
        <div class="day-meta">
          <div class="day-title">${d.title}</div>
          <div class="day-sub">
            <span>⏱ ${d.time}</span>
            ${d.topics ? `<span>📚 ${d.topics} topics</span>` : ''}
          </div>
        </div>
        ${checked ? '<span style="color:#6ee7b7;font-size:1.1rem">✓</span>' : ''}
        <span class="day-chevron">▼</span>
      </div>
      <div class="day-body">${d.content}</div>
    `;
    grid.appendChild(card);
  });
  if (shown === 0) {
    grid.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:40px">No results found.</div>';
  }
}
 
function toggleCard(card) {
  card.classList.toggle('open');
}
 
// Filter
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    buildGrid(currentFilter, currentSearch);
  });
});
 
// Search
let currentFilter = 'all', currentSearch = '';
document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value.toLowerCase().trim();
  buildGrid(currentFilter, currentSearch);
});
 
// Progress
function updateProgress() {
  const completed = days.filter(d => localStorage.getItem('day_' + d.day) === '1').length;
  const pct = Math.round((completed / 45) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = completed + ' / 45 days';
}
 
updateProgress();
buildGrid();
</script>
