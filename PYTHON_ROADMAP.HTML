

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python 60-Day Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg1: #0a0015;
    --bg2: #0d0025;
    --glass: rgba(255,255,255,0.05);
    --glass-border: rgba(255,255,255,0.12);
    --glass-hover: rgba(255,255,255,0.09);
    --accent1: #b200ff;
    --accent2: #00f0ff;
    --accent3: #ff6b35;
    --accent4: #39ff14;
    --accent5: #ff2d78;
    --gold: #ffd700;
    --text: #e8e8ff;
    --subtext: #a0a0cc;
    --h1-color: #00f0ff;
    --h2-color: #b200ff;
    --h3-color: #39ff14;
    --h4-color: #ff6b35;
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg1);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
 
  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(178,0,255,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(0,240,255,0.14) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(57,255,20,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
 
  /* Floating particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
 
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: floatUp linear infinite;
    opacity: 0;
  }
 
  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }
 
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    position: relative;
    z-index: 1;
  }
 
  /* Header */
  .hero {
    text-align: center;
    padding: 60px 20px 50px;
    position: relative;
  }
 
  .hero-badge {
    display: inline-block;
    background: rgba(178,0,255,0.15);
    border: 1px solid rgba(178,0,255,0.4);
    border-radius: 50px;
    padding: 6px 20px;
    font-family: 'Fira Code', monospace;
    font-size: 0.75rem;
    color: var(--accent1);
    letter-spacing: 2px;
    margin-bottom: 20px;
    animation: pulseGlow 2s ease-in-out infinite;
  }
 
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 10px rgba(178,0,255,0.3); }
    50% { box-shadow: 0 0 25px rgba(178,0,255,0.6); }
  }
 
  .hero h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2.2rem, 6vw, 4rem);
    font-weight: 900;
    background: linear-gradient(135deg, #00f0ff, #b200ff, #ff6b35);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    margin-bottom: 14px;
    filter: drop-shadow(0 0 30px rgba(0,240,255,0.3));
  }
 
  .hero-sub {
    font-size: 1.15rem;
    color: var(--subtext);
    letter-spacing: 1px;
    margin-bottom: 30px;
  }
 
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
 
  .stat-chip {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(12px);
    border-radius: 40px;
    padding: 8px 22px;
    font-family: 'Fira Code', monospace;
    font-size: 0.82rem;
    color: var(--accent2);
    display: flex;
    align-items: center;
    gap: 8px;
  }
 
  .stat-chip .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent4);
    animation: blink 1.5s ease-in-out infinite;
  }
 
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }
 
  /* Search */
  .search-wrap {
    max-width: 520px;
    margin: 0 auto 40px;
    position: relative;
  }
 
  .search-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(0,240,255,0.25);
    border-radius: 50px;
    padding: 14px 24px 14px 50px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    color: var(--text);
    outline: none;
    backdrop-filter: blur(10px);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
 
  .search-wrap input::placeholder { color: var(--subtext); }
  .search-wrap input:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 20px rgba(0,240,255,0.2);
  }
 
  .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.1rem;
    color: var(--accent2);
    pointer-events: none;
  }
 
  /* Progress bar */
  .progress-section {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(16px);
    border-radius: 18px;
    padding: 22px 28px;
    margin-bottom: 36px;
  }
 
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color: var(--subtext);
    margin-bottom: 10px;
    font-family: 'Fira Code', monospace;
  }
 
  .progress-track {
    height: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 50px;
    overflow: hidden;
  }
 
  .progress-fill {
    height: 100%;
    border-radius: 50px;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
    box-shadow: 0 0 12px rgba(0,240,255,0.5);
    transition: width 0.5s ease;
  }
 
  /* Day cards */
  .day-group {
    margin-bottom: 12px;
    animation: fadeSlide 0.5s ease both;
  }
 
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
 
  .day-header {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(16px);
    border-radius: 16px;
    padding: 16px 22px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
 
  .day-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.03));
    pointer-events: none;
  }
 
  .day-header:hover {
    background: var(--glass-hover);
    border-color: rgba(255,255,255,0.22);
    transform: translateX(4px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
  }
 
  .day-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    white-space: nowrap;
    letter-spacing: 1px;
    min-width: 80px;
    text-align: center;
  }
 
  .day-title {
    font-size: 1.05rem;
    font-weight: 600;
    flex: 1;
    line-height: 1.3;
  }
 
  .day-time {
    font-family: 'Fira Code', monospace;
    font-size: 0.72rem;
    color: var(--subtext);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
  }
 
  .chevron {
    font-size: 0.9rem;
    color: var(--subtext);
    transition: transform 0.3s ease;
    margin-left: 4px;
  }
 
  .day-header.open .chevron { transform: rotate(180deg); }
 
  .day-content {
    display: none;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-top: none;
    border-radius: 0 0 16px 16px;
    padding: 0;
    overflow: hidden;
  }
 
  .day-content.open { display: block; }
 
  .topic-block {
    padding: 20px 28px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
 
  .topic-block:last-child { border-bottom: none; }
 
  /* Heading styles */
  .h1-tag {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--h1-color);
    text-shadow: 0 0 20px rgba(0,240,255,0.5);
    margin-bottom: 14px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
 
  .h2-tag {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--h2-color);
    text-shadow: 0 0 15px rgba(178,0,255,0.5);
    margin-bottom: 12px;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
 
  .h3-tag {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--h3-color);
    text-shadow: 0 0 12px rgba(57,255,20,0.4);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
 
  .h4-tag {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--h4-color);
    text-shadow: 0 0 10px rgba(255,107,53,0.4);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
 
  .h-marker {
    font-family: 'Fira Code', monospace;
    font-size: 0.7em;
    opacity: 0.6;
  }
 
  /* Subtopic pills */
  .subtopics {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
    margin-bottom: 6px;
  }
 
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 13px;
    border-radius: 20px;
    font-size: 0.82rem;
    font-weight: 500;
    border: 1px solid;
    transition: all 0.2s;
    cursor: default;
  }
 
  .pill:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
 
  .pill-cyan {
    background: rgba(0,240,255,0.08);
    border-color: rgba(0,240,255,0.3);
    color: var(--accent2);
  }
 
  .pill-purple {
    background: rgba(178,0,255,0.08);
    border-color: rgba(178,0,255,0.3);
    color: var(--accent1);
  }
 
  .pill-green {
    background: rgba(57,255,20,0.07);
    border-color: rgba(57,255,20,0.3);
    color: var(--accent4);
  }
 
  .pill-orange {
    background: rgba(255,107,53,0.08);
    border-color: rgba(255,107,53,0.3);
    color: var(--accent3);
  }
 
  .pill-pink {
    background: rgba(255,45,120,0.08);
    border-color: rgba(255,45,120,0.3);
    color: var(--accent5);
  }
 
  .pill-gold {
    background: rgba(255,215,0,0.08);
    border-color: rgba(255,215,0,0.3);
    color: var(--gold);
  }
 
  /* Color band for day difficulty */
  .band-beginner { background: linear-gradient(90deg, rgba(57,255,20,0.6), rgba(0,240,255,0.6)); }
  .band-intermediate { background: linear-gradient(90deg, rgba(0,240,255,0.6), rgba(178,0,255,0.6)); }
  .band-advanced { background: linear-gradient(90deg, rgba(178,0,255,0.6), rgba(255,45,120,0.6)); }
  .band-expert { background: linear-gradient(90deg, rgba(255,45,120,0.6), rgba(255,107,53,0.6)); }
  .band-project { background: linear-gradient(90deg, rgba(255,215,0,0.6), rgba(255,107,53,0.6)); }
 
  .num-beginner { background: rgba(57,255,20,0.15); color: var(--accent4); border: 1px solid rgba(57,255,20,0.3); }
  .num-intermediate { background: rgba(0,240,255,0.15); color: var(--accent2); border: 1px solid rgba(0,240,255,0.3); }
  .num-advanced { background: rgba(178,0,255,0.15); color: var(--accent1); border: 1px solid rgba(178,0,255,0.3); }
  .num-expert { background: rgba(255,45,120,0.15); color: var(--accent5); border: 1px solid rgba(255,45,120,0.3); }
  .num-project { background: rgba(255,215,0,0.15); color: var(--gold); border: 1px solid rgba(255,215,0,0.3); }
 
  .color-bar {
    height: 3px;
    border-radius: 3px;
    margin-bottom: 0;
  }
 
  /* Scroll top */
  #scrollTop {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: rgba(178,0,255,0.3);
    border: 1px solid rgba(178,0,255,0.5);
    backdrop-filter: blur(10px);
    color: white;
    width: 44px; height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.1rem;
    display: none;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    z-index: 100;
  }
 
  #scrollTop:hover {
    background: rgba(178,0,255,0.5);
    box-shadow: 0 0 20px rgba(178,0,255,0.5);
    transform: translateY(-3px);
  }
 
  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 30px;
    justify-content: center;
  }
 
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.78rem;
    font-family: 'Fira Code', monospace;
    color: var(--subtext);
  }
 
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
  }
 
  /* Expand all btn */
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
 
  .ctrl-btn {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(10px);
    color: var(--text);
    padding: 8px 20px;
    border-radius: 30px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
 
  .ctrl-btn:hover {
    background: rgba(0,240,255,0.1);
    border-color: rgba(0,240,255,0.4);
    color: var(--accent2);
  }
 
  /* section desc */
  .section-desc {
    font-size: 0.88rem;
    color: var(--subtext);
    margin-bottom: 10px;
    line-height: 1.6;
    font-weight: 400;
  }
 
  .checkbox-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 6px;
  }
 
  .check-item {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 0.83rem;
    color: var(--subtext);
    transition: color 0.2s;
  }
 
  .check-item:hover { color: var(--text); }
 
  .check-item input[type="checkbox"] {
    accent-color: var(--accent2);
    width: 14px; height: 14px;
    cursor: pointer;
  }
 
  .completed-count {
    font-family: 'Fira Code', monospace;
    font-size: 0.8rem;
    color: var(--accent4);
    margin-left: auto;
  }
 
  /* responsive */
  @media (max-width: 600px) {
    .day-header { flex-wrap: wrap; gap: 8px; }
    .day-time { font-size: 0.68rem; }
    .day-title { font-size: 0.95rem; }
    .h1-tag { font-size: 1.3rem; }
    .h2-tag { font-size: 1.1rem; }
  }
</style>
</head>
<body>
 
<div class="particles" id="particles"></div>
 
<div class="container">
  <!-- HERO -->
  <div class="hero">
    <div class="hero-badge">⚡ PYTHON MASTERY PROGRAM</div>
    <h1>60-Day Python Roadmap</h1>
    <p class="hero-sub">From Zero to Professional Python Developer</p>
    <div class="stats-row">
      <div class="stat-chip"><span class="dot"></span> 60 Days</div>
      <div class="stat-chip"><span class="dot"></span> ~300+ Hours</div>
      <div class="stat-chip"><span class="dot"></span> 12 Phases</div>
      <div class="stat-chip"><span class="dot"></span> 100% Python</div>
    </div>
  </div>
 
  <!-- SEARCH -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search topics, subtopics..." />
  </div>
 
  <!-- PROGRESS -->
  <div class="progress-section">
    <div class="progress-label">
      <span>Overall Progress</span>
      <span id="progressText">0 / 60 days completed</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressBar" style="width: 0%"></div>
    </div>
  </div>
 
  <!-- LEGEND -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:rgba(57,255,20,0.6)"></div> Beginner</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(0,240,255,0.6)"></div> Intermediate</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(178,0,255,0.6)"></div> Advanced</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(255,45,120,0.6)"></div> Expert</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(255,215,0,0.6)"></div> Project Day</div>
  </div>
 
  <!-- CONTROLS -->
  <div class="controls">
    <button class="ctrl-btn" onclick="expandAll()">▼ Expand All</button>
    <button class="ctrl-btn" onclick="collapseAll()">▲ Collapse All</button>
    <button class="ctrl-btn" onclick="resetProgress()">🔄 Reset Progress</button>
    <span class="completed-count" id="completedCount">✅ 0 completed</span>
  </div>
 
  <!-- DAYS CONTAINER -->
  <div id="daysContainer"></div>
</div>
 
<button id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
 
<script>
// ============================================================
// ROADMAP DATA
// ============================================================
const roadmap = [
  // ── PHASE 1: DAYS 1-5 ─────────────────────────────────────
  {
    day: 1, level: "beginner", time: "4-5 hrs",
    title: "Python Setup & Absolute Basics",
    topics: [
      { type: "h1", text: "# Python Installation & Environment Setup" },
      { type: "desc", text: "Set up a clean Python development environment before writing a single line of code." },
      { type: "pills", color: "green", items: ["Python 3.12+ download", "Official python.org installer", "PATH environment variable", "Verify: python --version"] },
      { type: "h2", text: "## IDEs & Code Editors" },
      { type: "pills", color: "cyan", items: ["VS Code setup", "PyCharm Community", "Jupyter Notebook", "Google Colab (cloud)", "Thonny (beginners)", "IDLE (built-in)"] },
      { type: "h3", text: "### First Python Program" },
      { type: "pills", color: "purple", items: ["print() function", "Hello World", "Running .py files", "Interactive REPL", "Script mode vs interactive"] },
      { type: "h4", text: "#### Python Enhancement Proposals (PEPs)" },
      { type: "pills", color: "orange", items: ["PEP 8 style guide", "PEP 20 Zen of Python", "Indentation rules", "Comments with #", "Docstrings intro"] },
    ]
  },
  {
    day: 2, level: "beginner", time: "5 hrs",
    title: "Variables, Data Types & Operators",
    topics: [
      { type: "h1", text: "# Variables & Data Types" },
      { type: "desc", text: "Master Python's dynamic typing and core built-in data types." },
      { type: "pills", color: "green", items: ["Variable assignment", "Dynamic typing", "Type inference", "Variable naming rules", "Case sensitivity", "Underscore convention"] },
      { type: "h2", text: "## Numeric Types" },
      { type: "pills", color: "cyan", items: ["int (integers)", "float (decimals)", "complex (a+bj)", "Arbitrary precision int", "Scientific notation", "Underscores in numbers (1_000_000)"] },
      { type: "h2", text: "## String Type (str)" },
      { type: "pills", color: "purple", items: ["Single quotes", "Double quotes", "Triple quotes", "Raw strings r\"\"", "Byte strings b\"\"", "Unicode strings", "String escape sequences"] },
      { type: "h2", text: "## Boolean & None Types" },
      { type: "pills", color: "orange", items: ["True / False", "None type", "Truthy/Falsy values", "NoneType checks"] },
      { type: "h3", text: "### Operators" },
      { type: "pills", color: "pink", items: ["Arithmetic: + - * / // % **", "Comparison: == != < > <= >=", "Logical: and or not", "Assignment: = += -= *= /= //= **= %=", "Bitwise: & | ^ ~ << >>", "Identity: is, is not", "Membership: in, not in", "Walrus operator :="] },
      { type: "h4", text: "#### Type Conversion" },
      { type: "pills", color: "gold", items: ["int()", "float()", "str()", "bool()", "type()", "isinstance()", "Implicit conversion", "Explicit casting"] },
    ]
  },
  {
    day: 3, level: "beginner", time: "5 hrs",
    title: "Strings In-Depth",
    topics: [
      { type: "h1", text: "# String Manipulation Mastery" },
      { type: "desc", text: "Strings are everywhere. Learn every method and technique." },
      { type: "h2", text: "## String Indexing & Slicing" },

// RENDER
// ============================================================
const colors = ["cyan","purple","green","orange","pink","gold"];
let completedDays = JSON.parse(localStorage.getItem('pythonRoadmapDone') || '[]');
 
function getPillColor(color, i) {
  if(color) return 'pill-'+color;
  return 'pill-' + colors[i % colors.length];
}
 
function renderTopics(topics) {
  return topics.map(t => {
    if(t.type === "h1") return `<div class="h1-tag"><span class="h-marker">#</span>${t.text.replace(/^#\s*/,'')}</div>`;
    if(t.type === "h2") return `<div class="h2-tag"><span class="h-marker">##</span>${t.text.replace(/^##\s*/,'')}</div>`;
    if(t.type === "h3") return `<div class="h3-tag"><span class="h-marker">###</span>${t.text.replace(/^###\s*/,'')}</div>`;
    if(t.type === "h4") return `<div class="h4-tag"><span class="h-marker">####</span>${t.text.replace(/^####\s*/,'')}</div>`;
    if(t.type === "desc") return `<p class="section-desc">${t.text}</p>`;
    if(t.type === "pills") {
      const pills = t.items.map(item => `<span class="pill pill-${t.color||'cyan'}">${item}</span>`).join('');
      return `<div class="subtopics">${pills}</div>`;
    }
    return '';
  }).join('');
}
 
function renderDays(data) {
  const container = document.getElementById('daysContainer');
  container.innerHTML = '';
 
  data.forEach((d, idx) => {
    const isCompleted = completedDays.includes(d.day);
    const div = document.createElement('div');
    div.className = 'day-group';
    div.style.animationDelay = (idx * 0.03) + 's';
    div.dataset.search = (d.title + ' ' + d.topics.map(t=>t.text||t.items?.join(' ')||'').join(' ')).toLowerCase();
 
    div.innerHTML = `
      <div class="day-header" onclick="toggle(this)" data-day="${d.day}">
        <div class="color-bar band-${d.level}" style="position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:16px 0 0 16px;"></div>
        <span class="day-num num-${d.level}" style="margin-left:8px">DAY ${d.day}</span>
        <span class="day-title">${d.title}</span>
        <span class="day-time">⏱ ${d.time}</span>
        <input type="checkbox" class="day-check" ${isCompleted?'checked':''} onclick="markDay(event, ${d.day})" style="accent-color:var(--accent4);cursor:pointer;width:16px;height:16px;" title="Mark complete">
        <span class="chevron">▼</span>
      </div>
      <div class="day-content">
        <div class="topic-block">${renderTopics(d.topics)}</div>
      </div>
    `;
    container.appendChild(div);
  });
  updateProgress();
}
 
function toggle(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}
 
function markDay(e, day) {
  e.stopPropagation();
  if(e.target.checked) {
    if(!completedDays.includes(day)) completedDays.push(day);
  } else {
    completedDays = completedDays.filter(d => d !== day);
  }
  localStorage.setItem('pythonRoadmapDone', JSON.stringify(completedDays));
  updateProgress();
}
 
function updateProgress() {
  const pct = Math.round((completedDays.length / 60) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${completedDays.length} / 60 days completed`;
  document.getElementById('completedCount').textContent = `✅ ${completedDays.length} completed`;
}
 
function expandAll() {
  document.querySelectorAll('.day-header').forEach(h => h.classList.add('open'));
  document.querySelectorAll('.day-content').forEach(c => c.classList.add('open'));
}
 
function collapseAll() {
  document.querySelectorAll('.day-header').forEach(h => h.classList.remove('open'));
  document.querySelectorAll('.day-content').forEach(c => c.classList.remove('open'));
}
 
function resetProgress() {
  if(confirm('Reset all progress?')) {
    completedDays = [];
    localStorage.removeItem('pythonRoadmapDone');
    document.querySelectorAll('.day-check').forEach(c => c.checked = false);
    updateProgress();
  }
}
 
// Search
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll('.day-group').forEach(g => {
    if(!q || g.dataset.search.includes(q)) {
      g.style.display = '';
      if(q) {
        g.querySelector('.day-header').classList.add('open');
        g.querySelector('.day-content').classList.add('open');
      }
    } else {
      g.style.display = 'none';
    }
  });
});
 
// Scroll top
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTop');
  btn.style.display = window.scrollY > 400 ? 'flex' : 'none';
});
 
// Particles
function createParticles() {
  const container = document.getElementById('particles');
  const colors_p = ['#b200ff','#00f0ff','#39ff14','#ff6b35','#ff2d78','#ffd700'];
  for(let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 1;
    p.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${Math.random() * 100}%;
      background: ${colors_p[Math.floor(Math.random()*colors_p.length)]};
      animation-duration: ${Math.random() * 15 + 8}s;
      animation-delay: ${Math.random() * 10}s;
      filter: blur(${Math.random()*1}px);
      box-shadow: 0 0 ${size*2}px currentColor;
    `;
    container.appendChild(p);
  }
}
 
// Init
renderDays(roadmap);
createParticles();
